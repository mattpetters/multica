name: Deploy (CD)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Full commit SHA to deploy (default: latest main)'
        required: false
        type: string

# Only one deploy at a time; cancel stale runs.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/multica-backend
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/multica-web
  VPS_HOST: 100.81.242.93
  VPS_USER: root
  DEPLOY_DIR: /docker/multica

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          TARGET_SHA="${{ github.event.inputs.commit_sha || github.sha }}"
          SHA_SHORT="${TARGET_SHA:0:7}"
          IMAGE_TAG="sha-${TARGET_SHA}"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$(git log -1 --pretty=%s "$TARGET_SHA" 2>/dev/null || echo 'manual-deploy')" >> "$GITHUB_OUTPUT"
          echo "committed_at=$(git log -1 --format=%cI "$TARGET_SHA" 2>/dev/null || echo 'now')" >> "$GITHUB_OUTPUT"

      # ── Build & Push Backend Image ──────────────────────────────
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.sha_short }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=deploy-backend
          cache-to: type=gha,mode=max,scope=deploy-backend

      # ── Build & Push Frontend Image ───────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_WS_URL=wss://recurse.pro/ws
            NEXT_PUBLIC_APP_VERSION=${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=deploy-web
          cache-to: type=gha,mode=max,scope=deploy-web

      # ── Connect to Tailnet ────────────────────────────────────
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: gh-multica-cd

      - name: Test SSH connection
        run: |
          # Set up SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=10 \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "echo '✅ SSH OK'; hostname; uname -m; docker --version"

      # ── Copy deploy scripts to VPS ───────────────────────────
      - name: Copy deploy scripts to VPS
        run: |
          scp -o StrictHostKeyChecking=accept-new \
            scripts/cd-deploy.sh ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.DEPLOY_DIR }}/scripts/
          scp -o StrictHostKeyChecking=accept-new \
            scripts/cd-health-check.sh ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.DEPLOY_DIR }}/scripts/
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "chmod +x ${{ env.DEPLOY_DIR }}/scripts/cd-deploy.sh ${{ env.DEPLOY_DIR }}/scripts/cd-health-check.sh"

      # ── Run Deploy ───────────────────────────────────────────
      - name: Run deploy
        id: deploy
        shell: bash
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            DEPLOY_DIR=${{ env.DEPLOY_DIR }} \
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }} \
            WEB_IMAGE=${{ env.WEB_IMAGE }} \
            IMAGE_TAG=${{ steps.meta.outputs.image_tag }} \
            COMMIT_SHA=${{ steps.meta.outputs.target_sha }} \
            COMMIT_MSG='${{ steps.meta.outputs.commit_msg }}' \
            GHCR_PAT='${{ secrets.GHCR_PAT }}' \
            GHCR_USER='${{ github.actor }}' \
            bash ${{ env.DEPLOY_DIR }}/scripts/cd-deploy.sh

      # ── Health Check ──────────────────────────────────────────
      - name: Health check
        id: health
        shell: bash
        run: |
          # Give containers time to settle
          sleep 10
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            bash ${{ env.DEPLOY_DIR }}/scripts/cd-health-check.sh

      # ── Rollback on Failure ──────────────────────────────────
      - name: Rollback on health check failure
        if: failure() && steps.deploy.outcome == 'success'
        shell: bash
        run: |
          echo "=== ❌ Health check failed — rolling back ==="

          PREV_TAG=$(ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            'cat /tmp/.cd-prev-tag 2>/dev/null || echo ""')

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — cannot rollback"
            exit 1
          fi

          echo "Rolling back to: $PREV_TAG"
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            DEPLOY_DIR=${{ env.DEPLOY_DIR }} \
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }} \
            WEB_IMAGE=${{ env.WEB_IMAGE }} \
            IMAGE_TAG="$PREV_TAG" \
            COMMIT_SHA="rollback" \
            COMMIT_MSG="rollback to $PREV_TAG" \
            bash ${{ env.DEPLOY_DIR }}/scripts/cd-deploy.sh

          # Health check after rollback
          sleep 10
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            bash ${{ env.DEPLOY_DIR }}/scripts/cd-health-check.sh && \
            echo "⏪ Rollback successful" || \
            echo "⏪ Rollback deployed but health check still failing"

      # ── Notifications ────────────────────────────────────────
      - name: Notify deploy failure
        if: failure()
        shell: bash
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping notification"
            exit 0
          fi
          SHA="${{ steps.meta.outputs.sha_short }}"
          MSG='${{ steps.meta.outputs.commit_msg }}'
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="🚨 *Deploy FAILED* — \`${{ github.repository }}\`%0ACcommit: \`${SHA}\` — ${MSG}%0AJob: [#${{ github.run_number }}](${URL})"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true" > /dev/null

      - name: Notify deploy success
        if: success()
        shell: bash
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping notification"
            exit 0
          fi
          SHA="${{ steps.meta.outputs.sha_short }}"
          MSG='${{ steps.meta.outputs.commit_msg }}'
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="✅ *Deploy succeeded* — \`${{ github.repository }}\`%0ACcommit: \`${SHA}\` — ${MSG}%0AJob: [#${{ github.run_number }}](${URL})"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true" > /dev/null
